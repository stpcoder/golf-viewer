name: Mirror To Stpcoder

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: mirror-stpcoder
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to stpcoder mirror
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git remote add stpcoder-mirror https://x-access-token:${{ secrets.STPCODER_MIRROR_PAT }}@github.com/stpcoder/parameter-golf-leaderboard.git
          git push --force-with-lease stpcoder-mirror HEAD:main
